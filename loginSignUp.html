<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register & Login | MILO</title>
  <link rel="stylesheet" href="login.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script type="module" src="firebaseauth.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <div class="container">
    <!-- Left Side -->
    <div class="left-section">
      <img src="assets/images/frst.png" alt="Floating Leaf" class="leaf" />
    </div>

    <!-- Right Side -->
    <div class="right-section">
      <!-- Sign In Form -->
      <div class="form-box" id="signIn">
        <h2>Sign In to MILO</h2>
        <form method="post" action="">
          <div id="signInMessage" class="messageDiv" style="display:none;"></div>
          <input type="email" id="email" placeholder="Email" required />
          <input type="password" id="password" placeholder="Password" required />
          <button type="submit" class="login-btn" id="submitSignIn">Sign In</button>
          <div class="links">
            <a href="#">Forgot password?</a>
            <span>·</span>
            <button type="button" id="signUpButton">Create an account</button>
          </div>
          <div class="divider">or</div>
          <button type="button" class="google-btn">
            <i class="fab fa-google"></i>
            Sign in with Google
          </button>
        </form>
      </div>

      <!-- Sign Up Form -->
      <div class="form-box" id="signup" style="display:none;">
        <h2>Register to MILO</h2>
        <form method="post" action="">
          <div id="signUpMessage" class="messageDiv" style="display:none;"></div>
          <input type="text" id="fName" placeholder="First Name" required />
          <input type="text" id="lName" placeholder="Last Name" required />
          <input type="email" id="rEmail" placeholder="Email" required />
          <input type="password" id="rPassword" placeholder="Password" required />
          <button type="submit" class="login-btn" id="submitSignUp">Sign Up</button>
          <div id="termsNote" class="note" style="display:none; font-size: 0.85rem; color: #444; text-align: center; margin-top: 0.5rem;">
            Note - By signing up to our service, you agree to our <a href="#" style="color: #006eff; text-decoration: none;">terms and conditions</a>.
          </div>
          <div class="links">
            <a href="#">Already have an account?</a>
            <span>·</span>
            <button type="button" id="signInButton">Sign In</button>
          </div>
          <div class="divider">or</div>
          <button type="button" class="google-btn">
            <i class="fab fa-google"></i>
            Sign up with Google
          </button>
        </form>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
